<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gen Soccer Ultimate</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#0b0b0b;
}

/* GAME */

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
    repeating-linear-gradient(
        90deg,
        #1b8a3d 0px,
        #1b8a3d 120px,
        #2ca84c 120px,
        #2ca84c 240px
    );
}

/* OUTER BORDER */

#game::after{
    content:"";

    position:absolute;
    inset:0;

    border:10px solid white;

    pointer-events:none;

    box-shadow:
    inset 0 0 25px rgba(255,255,255,0.35);
}

/* FIELD */

.line{
    position:absolute;
    background:white;
}

.center-line{
    width:4px;
    height:100%;
    left:50%;
    transform:translateX(-50%);
}

.center-circle{
    position:absolute;
    width:240px;
    height:240px;
    border:5px solid white;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.goal-box{
    position:absolute;
    width:170px;
    height:340px;
    border:5px solid white;
    top:50%;
    transform:translateY(-50%);
}

.goal-box.left{
    left:0;
}

.goal-box.right{
    right:0;
}

.goal{
    position:absolute;
    width:25px;
    height:340px;
    background:white;
    top:50%;
    transform:translateY(-50%);
}

.goal.left{
    left:0;
}

.goal.right{
    right:0;
}

/* PLAYERS */

.player,
.cpu,
.player-goalie,
.cpu-goalie{
    position:absolute;
    border-radius:50%;
    border:4px solid white;
}

/* MAIN PLAYER */

.player{
    width:82px;
    height:82px;
    background:#1971c2;
    box-shadow:0 0 30px #4dabf7;
}

/* CPU */

.cpu{
    width:82px;
    height:82px;
    background:#e03131;
    box-shadow:0 0 30px #ff6b6b;
}

/* GOALIES */

.player-goalie{
    width:70px;
    height:70px;
    background:#7048e8;
    box-shadow:0 0 25px #b197fc;
}

.cpu-goalie{
    width:70px;
    height:70px;
    background:#f59f00;
    box-shadow:0 0 25px #ffd43b;
}

/* BALL */

.ball{
    position:absolute;
    width:48px;
    height:48px;
    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,white,#ccc);

    border:3px solid black;

    box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* HUD */

.hud{
    position:absolute;
    width:100%;
    top:15px;

    display:flex;
    justify-content:center;
    gap:50px;

    color:white;
    font-size:42px;
    font-weight:bold;

    text-shadow:3px 3px 8px black;

    z-index:10;
}

/* STAMINA */

.stamina-box{
    position:absolute;
    left:20px;
    top:20px;

    width:260px;
    height:24px;

    border-radius:20px;
    overflow:hidden;

    border:2px solid white;

    background:#333;
}

.stamina{
    width:100%;
    height:100%;
    background:lime;
}

/* POWER */

.power-box{
    position:absolute;
    left:20px;
    top:60px;

    width:260px;
    height:20px;

    border-radius:20px;
    overflow:hidden;

    border:2px solid white;

    background:#333;
}

.power{
    width:0%;
    height:100%;
    background:orange;
}

/* TIMER */

.timer{
    position:absolute;
    top:20px;
    right:20px;

    color:white;
    font-size:32px;
    font-weight:bold;
}

/* CONTROLS */

.controls{
    position:absolute;
    left:20px;
    bottom:20px;

    padding:16px;

    color:white;

    background:rgba(0,0,0,0.45);

    border-radius:14px;

    font-size:18px;
}

/* WIN SCREEN */

#winner{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,0.92);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;

    color:white;
}

#winner h1{
    font-size:100px;
    margin-bottom:25px;

    text-shadow:0 0 30px white;
}

#winner button{
    padding:16px 42px;

    border:none;
    border-radius:14px;

    background:#2f9e44;

    color:white;

    font-size:25px;

    cursor:pointer;
}

/* PARTICLES */

.particle{
    position:absolute;

    width:10px;
    height:10px;

    border-radius:50%;

    background:white;

    pointer-events:none;
}

/* TRAILS */

.trail{
    position:absolute;
    width:24px;
    height:24px;
    border-radius:50%;
    pointer-events:none;
    opacity:0.5;
}

</style>
</head>

<body>

<div id="game">

    <div class="line center-line"></div>

    <div class="center-circle"></div>

    <div class="goal-box left"></div>
    <div class="goal-box right"></div>

    <div class="goal left"></div>
    <div class="goal right"></div>

    <div class="hud">
        <div>PLAYER <span id="playerScore">0</span></div>
        <div>CPU <span id="cpuScore">0</span></div>
    </div>

    <div class="stamina-box">
        <div class="stamina" id="stamina"></div>
    </div>

    <div class="power-box">
        <div class="power" id="power"></div>
    </div>

    <div class="timer">
        ⏱ <span id="time">180</span>
    </div>

    <div class="player" id="player"></div>
    <div class="cpu" id="cpu"></div>

    <div class="player-goalie" id="playerGoalie"></div>
    <div class="cpu-goalie" id="cpuGoalie"></div>

    <div class="ball" id="ball"></div>

    <div class="controls">
        W A S D = Move<br>
        SHIFT = Sprint<br>
        SPACE = Power Shot
    </div>

    <div id="winner">
        <h1 id="winnerText"></h1>

        <button onclick="restartGame()">
            PLAY AGAIN
        </button>
    </div>

</div>

<script>

/* ELEMENTS */

const player = document.getElementById("player");
const cpu = document.getElementById("cpu");

const playerGoalie =
document.getElementById("playerGoalie");

const cpuGoalie =
document.getElementById("cpuGoalie");

const ball = document.getElementById("ball");

const staminaBar =
document.getElementById("stamina");

const powerBar =
document.getElementById("power");

const playerScoreText =
document.getElementById("playerScore");

const cpuScoreText =
document.getElementById("cpuScore");

const timerText =
document.getElementById("time");

const winnerScreen =
document.getElementById("winner");

const winnerText =
document.getElementById("winnerText");

const game =
document.getElementById("game");

/* VARIABLES */

const keys = {};

let playerScore = 0;
let cpuScore = 0;

let gameEnded = false;

/* PLAYER */

let playerX = 150;
let playerY = innerHeight/2;

let playerVX = 0;
let playerVY = 0;

/* CPU */

let cpuX = innerWidth - 220;
let cpuY = innerHeight/2;

let cpuVX = 0;
let cpuVY = 0;

/* GOALIES */

let playerGoalieY =
innerHeight/2;

let cpuGoalieY =
innerHeight/2;

/* BALL */

let ballX = innerWidth/2;
let ballY = innerHeight/2;

let ballVX = 0;
let ballVY = 0;

/* SYSTEMS */

let stamina = 100;
let power = 0;

let exhausted = false;
let exhaustTimer = 0;

let shootCooldown = 0;

let timeLeft = 180;

/* GOAL AREA */

const goalTop =
innerHeight/2 - 170;

const goalBottom =
innerHeight/2 + 170;

/* INPUT */

document.addEventListener("keydown",e=>{

    keys[e.key.toLowerCase()] = true;

});

document.addEventListener("keyup",e=>{

    keys[e.key.toLowerCase()] = false;

});

/* PLAYER */

function movePlayer(){

    let acceleration = 0.55;
    let friction = 0.88;
    let maxSpeed = 5;

    if(keys["shift"] && stamina > 0 && !exhausted){

        maxSpeed = 6.5;

        stamina -= 1.1;

        createTrail(
            playerX+20,
            playerY+20,
            "#4dabf7"
        );

    }else{

        stamina += 0.35;
    }

    if(stamina <= 0){

        stamina = 0;

        exhausted = true;

        exhaustTimer = 120;
    }

    if(exhausted){

        maxSpeed = 3.4;

        exhaustTimer--;

        if(exhaustTimer <= 0){

            exhausted = false;
        }
    }

    stamina =
    Math.max(0,Math.min(100,stamina));

    staminaBar.style.width =
    stamina + "%";

    if(keys["w"]) playerVY -= acceleration;
    if(keys["s"]) playerVY += acceleration;

    if(keys["a"]) playerVX -= acceleration;
    if(keys["d"]) playerVX += acceleration;

    playerVX =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,playerVX));

    playerVY =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,playerVY));

    playerX += playerVX;
    playerY += playerVY;

    playerVX *= friction;
    playerVY *= friction;

    playerX =
    Math.max(10,
    Math.min(innerWidth-92,playerX));

    playerY =
    Math.max(10,
    Math.min(innerHeight-92,playerY));

    player.style.left =
    playerX + "px";

    player.style.top =
    playerY + "px";

    player.style.transform =
    `rotate(${playerVX*4}deg)`;

    if(keys[" "]){

        power += 1.8;

        power =
        Math.min(100,power);

    }else{

        power -= 2.5;

        power =
        Math.max(0,power);
    }

    powerBar.style.width =
    power + "%";

    if(shootCooldown > 0)
    shootCooldown--;
}

/* CPU */

function moveCPU(){

    let targetX;
    let targetY;

    const attacking =
    ballX > innerWidth/2;

    if(attacking){

        targetX = ballX;
        targetY = ballY;

    }else{

        targetX =
        innerWidth - 320;

        targetY =
        innerHeight/2 +
        Math.sin(Date.now()*0.002)*120;
    }

    cpuVX +=
    (targetX - cpuX) * 0.0012;

    cpuVY +=
    (targetY - cpuY) * 0.0012;

    const maxSpeed = 5;

    cpuVX =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,cpuVX));

    cpuVY =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,cpuVY));

    cpuVX *= 0.93;
    cpuVY *= 0.93;

    cpuX += cpuVX;
    cpuY += cpuVY;

    cpu.style.left =
    cpuX + "px";

    cpu.style.top =
    cpuY + "px";
}

/* GOALIES */

function moveGoalies(){

    playerGoalieY +=
    (ballY - playerGoalieY) * 0.05;

    cpuGoalieY +=
    (ballY - cpuGoalieY) * 0.05;

    playerGoalieY =
    Math.max(
        goalTop,
        Math.min(goalBottom-70,
        playerGoalieY)
    );

    cpuGoalieY =
    Math.max(
        goalTop,
        Math.min(goalBottom-70,
        cpuGoalieY)
    );

    playerGoalie.style.left =
    "65px";

    playerGoalie.style.top =
    playerGoalieY + "px";

    cpuGoalie.style.left =
    (innerWidth-105) + "px";

    cpuGoalie.style.top =
    cpuGoalieY + "px";
}

/* BALL */

function updateBall(){

    ballX += ballVX;
    ballY += ballVY;

    ballVX *= 0.982;
    ballVY *= 0.982;

    if(Math.abs(ballVX) < 0.05)
    ballVX = 0;

    if(Math.abs(ballVY) < 0.05)
    ballVY = 0;

    /* TOP WALL */

    if(ballY <= 0){

        ballY = 0;

        ballVY *= -0.85;
    }

    /* BOTTOM WALL */

    if(ballY >= innerHeight-48){

        ballY = innerHeight-48;

        ballVY *= -0.85;
    }

    /* LEFT WALL */

    if(
        ballX <= 0 &&
        !(ballY > goalTop && ballY < goalBottom)
    ){

        ballX = 0;

        ballVX *= -0.9;
    }

    /* RIGHT WALL */

    if(
        ballX >= innerWidth-48 &&
        !(ballY > goalTop && ballY < goalBottom)
    ){

        ballX = innerWidth-48;

        ballVX *= -0.9;
    }

    collidePlayer(
        playerX,
        playerY,
        true
    );

    collidePlayer(
        cpuX,
        cpuY,
        false
    );

    collideGoalie(
        65,
        playerGoalieY
    );

    collideGoalie(
        innerWidth-105,
        cpuGoalieY
    );

    /* GOALS */

    if(
        ballX <= 0 &&
        ballY > goalTop &&
        ballY < goalBottom
    ){

        cpuScore++;

        cpuScoreText.textContent =
        cpuScore;

        goalExplosion();

        resetField();
    }

    if(
        ballX >= innerWidth-48 &&
        ballY > goalTop &&
        ballY < goalBottom
    ){

        playerScore++;

        playerScoreText.textContent =
        playerScore;

        goalExplosion();

        resetField();
    }

    if(playerScore >= 5 ||
       cpuScore >= 5){

        endGame();
    }

    ball.style.left =
    ballX + "px";

    ball.style.top =
    ballY + "px";

    ball.style.transform =
    `rotate(${ballX+ballY}deg)`;
}

/* COLLISION */

function collidePlayer(x,y,isPlayer){

    const dx =
    (ballX+24) - (x+41);

    const dy =
    (ballY+24) - (y+41);

    const dist =
    Math.hypot(dx,dy);

    if(dist < 68 && shootCooldown <= 0){

        const angle =
        Math.atan2(dy,dx);

        const strength =
        isPlayer
        ? 10 + (power/5)
        : 10;

        ballVX =
        Math.cos(angle) * strength;

        ballVY =
        Math.sin(angle) * strength;

        ballVY +=
        playerVX * 0.7;

        shootCooldown = 14;

        shakeScreen(8);

        spawnParticles(
            ballX,
            ballY
        );
    }
}

/* GOALIE COLLISION */

function collideGoalie(x,y){

    const dx =
    (ballX+24) - (x+35);

    const dy =
    (ballY+24) - (y+35);

    const dist =
    Math.hypot(dx,dy);

    if(dist < 58){

        ballVX *= -1.2;
        ballVY *= 1.1;

        spawnParticles(
            ballX,
            ballY
        );
    }
}

/* PARTICLES */

function spawnParticles(x,y){

    for(let i=0;i<14;i++){

        const p =
        document.createElement("div");

        p.classList.add("particle");

        p.style.left =
        x + "px";

        p.style.top =
        y + "px";

        document.body.appendChild(p);

        const angle =
        Math.random()*Math.PI*2;

        const speed =
        Math.random()*7;

        let px = x;
        let py = y;

        const interval =
        setInterval(()=>{

            px +=
            Math.cos(angle)*speed;

            py +=
            Math.sin(angle)*speed;

            p.style.left =
            px + "px";

            p.style.top =
            py + "px";

            p.style.opacity -= 0.04;

        },16);

        setTimeout(()=>{

            clearInterval(interval);

            p.remove();

        },400);
    }
}

/* TRAIL */

function createTrail(x,y,color){

    const t =
    document.createElement("div");

    t.className = "trail";

    t.style.left = x+"px";
    t.style.top = y+"px";

    t.style.background = color;

    document.body.appendChild(t);

    let opacity = 0.5;

    const fade = setInterval(()=>{

        opacity -= 0.04;

        t.style.opacity = opacity;

        if(opacity <= 0){

            clearInterval(fade);

            t.remove();
        }

    },16);
}

/* SCREEN SHAKE */

function shakeScreen(power){

    let shakes = 8;

    const interval =
    setInterval(()=>{

        const x =
        (Math.random()-0.5)*power;

        const y =
        (Math.random()-0.5)*power;

        game.style.transform =
        `translate(${x}px,${y}px)`;

        shakes--;

        if(shakes <= 0){

            clearInterval(interval);

            game.style.transform =
            "translate(0,0)";
        }

    },16);
}

/* GOAL EFFECT */

function goalExplosion(){

    document.body.style.background =
    "white";

    setTimeout(()=>{

        document.body.style.background =
        "#0b0b0b";

    },120);

    spawnParticles(ballX,ballY);
}

/* RESET */

function resetField(){

    playerX = 150;
    playerY = innerHeight/2;

    cpuX = innerWidth-220;
    cpuY = innerHeight/2;

    ballX = innerWidth/2;
    ballY = innerHeight/2;

    ballVX = 0;
    ballVY = 0;
}

/* TIMER */

setInterval(()=>{

    if(gameEnded) return;

    if(timeLeft > 0){

        timeLeft--;

        timerText.textContent =
        timeLeft;

    }else{

        endGame();
    }

},1000);

/* END GAME */

function endGame(){

    gameEnded = true;

    winnerScreen.style.display =
    "flex";

    if(playerScore > cpuScore){

        winnerText.textContent =
        "YOU WIN!";

    }else if(cpuScore > playerScore){

        winnerText.textContent =
        "CPU WINS!";

    }else{

        winnerText.textContent =
        "DRAW!";
    }
}

/* RESTART */

function restartGame(){

    location.reload();
}

/* GAME LOOP */

function gameLoop(){

    if(!gameEnded){

        movePlayer();

        moveCPU();

        moveGoalies();

        updateBall();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
