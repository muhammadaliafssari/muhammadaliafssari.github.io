<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gen Soccer Ultimate</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#0b0b0b;
}

/* GAME WORLD */
#game{
    position:absolute;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
    repeating-linear-gradient(
        90deg,
        #1b8a3d 0px,
        #1b8a3d 120px,
        #2ca84c 120px,
        #2ca84c 240px
    );
    transform-origin:center;
}

/* BORDER */
#game::after{
    content:"";
    position:absolute;
    inset:0;
    border:10px solid white;
    pointer-events:none;
}

/* PLAYERS */
.player,.cpu,.mate,.enemy,
.player-goalie,.cpu-goalie{
    position:absolute;
    border-radius:50%;
    border:4px solid white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:white;
}

.player{width:82px;height:82px;background:#1971c2;}
.cpu{width:82px;height:82px;background:#e03131;}

.mate{width:70px;height:70px;background:#4dabf7;}
.enemy{width:70px;height:70px;background:#ff6b6b;}

.player-goalie{width:70px;height:70px;background:#7048e8;}
.cpu-goalie{width:70px;height:70px;background:#f59f00;}

/* BALL */
.ball{
    position:absolute;
    width:48px;
    height:48px;
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ccc);
    border:3px solid black;
}

/* UI */
.hud{
    position:absolute;
    top:15px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:50px;
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:3px 3px 8px black;
}

.stamina-box,.power-box{
    position:absolute;
    left:20px;
    width:260px;
    height:22px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    border:2px solid white;
}

.stamina-box{top:20px;}
.power-box{top:60px;}

.stamina{background:lime;height:100%;width:100%;}
.power{background:orange;height:100%;width:0%;}

.timer{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    font-size:32px;
    font-weight:bold;
}

/* TRAIL */
.trail{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    opacity:0.5;
    pointer-events:none;
}

/* PARTICLES */
.particle{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="game">

    <div class="hud">
        <div>PLAYER <span id="ps">0</span></div>
        <div>CPU <span id="cs">0</span></div>
    </div>

    <div class="stamina-box"><div class="stamina" id="stamina"></div></div>
    <div class="power-box"><div class="power" id="power"></div></div>

    <div class="timer">⏱ <span id="time">180</span></div>

    <div class="player" id="player">10</div>
    <div class="cpu" id="cpu">9</div>

    <div class="mate" id="m1">7</div>
    <div class="mate" id="m2">8</div>

    <div class="enemy" id="e1">11</div>
    <div class="enemy" id="e2">12</div>

    <div class="player-goalie" id="pg"></div>
    <div class="cpu-goalie" id="cg"></div>

    <div class="ball" id="ball"></div>

</div>

<script>

/* INPUT */
const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* ELEMENTS */
const game=document.getElementById("game");
const ball=document.getElementById("ball");

/* STATE */
let p={x:150,y:400,vx:0,vy:0,st:100};
let c={x:900,y:400};

let b={x:500,y:400,vx:0,vy:0};

let m1={x:300,y:250};
let m2={x:300,y:550};
let e1={x:800,y:250};
let e2={x:800,y:550};

let stamina=100;
let power=0;

let camX=0, camY=0;

/* MOVE PLAYER */
function movePlayer(){

let sp=5;
if(keys["shift"] && stamina>0){
sp=7;
stamina-=0.8;
}else stamina+=0.4;

stamina=Math.max(0,Math.min(100,stamina));

if(keys["w"])p.y-=sp;
if(keys["s"])p.y+=sp;
if(keys["a"])p.x-=sp;
if(keys["d"])p.x+=sp;

/* PASS */
if(keys["q"]) pass();

/* SHOOT */
if(keys[" "]){
if(dist(p,b)<80){
b.vx=(b.x-p.x)*0.1;
b.vy=(b.y-p.y)*0.1;
}
}

/* TACKLE */
if(keys["e"]) tackle();

/* POWER */
if(keys[" "]) power=Math.min(100,power);
else power=Math.max(0,power-2);

}

/* PASS */
function pass(){

let targets=[m1,m2];
let best=targets[0];

targets.forEach(t=>{
if(dist(p,t)<dist(p,best)) best=t;
});

b.vx=(best.x-b.x)*0.1;
b.vy=(best.y-b.y)*0.1;
}

/* CPU */
function moveCPU(){
c.x+=(b.x-c.x)*0.01;
c.y+=(b.y-c.y)*0.01;
}

/* BOTS */
function moveBots(){

[m1,m2,e1,e2].forEach(t=>{
t.x+=(b.x-t.x)*0.008;
t.y+=(b.y-t.y)*0.008;

if(dist(t,b)<60){
b.vx+=(b.x-t.x)*0.03;
b.vy+=(b.y-t.y)*0.03;
}
});
}

/* TACKLE */
function tackle(){
if(dist(p,c)<70){
if(Math.random()>0.7){
b.vx=0;b.vy=0;
}else{
b.vx+=(p.x-c.x)*0.2;
b.vy+=(p.y-c.y)*0.2;
}
}
}

/* BALL */
function updateBall(){

b.x+=b.vx;
b.y+=b.vy;

b.vx*=0.98;
b.vy*=0.98;

if(b.y<0||b.y>innerHeight)b.vy*=-0.85;
if(b.x<0||b.x>innerWidth)b.vx*=-0.85;

ball.style.left=b.x+"px";
ball.style.top=b.y+"px";
}

/* CAMERA */
function camera(){
camX=p.x-innerWidth/2;
camY=p.y-innerHeight/2;
game.style.transform=`translate(${-camX}px,${-camY}px)`;
}

/* DIST */
function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

/* LOOP */
function loop(){

movePlayer();
moveCPU();
moveBots();
updateBall();
camera();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
