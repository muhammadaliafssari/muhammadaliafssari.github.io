<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gen Soccer Ultimate (Fixed)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#0b0b0b;
}

/* CAMERA WRAPPER (FIXED SHAKE LAYER) */
#camera{
    width:100vw;
    height:100vh;
    position:relative;
}

/* GAME */
#game{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;

    background:
    repeating-linear-gradient(
        90deg,
        #1b8a3d 0px,
        #1b8a3d 120px,
        #2ca84c 120px,
        #2ca84c 240px
    );
}

/* BORDER */
#game::after{
    content:"";
    position:absolute;
    inset:0;
    border:10px solid white;
    pointer-events:none;
    box-shadow: inset 0 0 25px rgba(255,255,255,0.35);
}

/* FIELD ELEMENTS */
.line,.center-circle,.goal-box,.goal,.player,.cpu,.ball,.player-goalie,.cpu-goalie{
    position:absolute;
}

/* CENTER */
.center-circle{
    width:240px;
    height:240px;
    border:5px solid white;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

/* GOALS */
.goal-box{
    width:170px;
    height:340px;
    border:5px solid white;
    top:50%;
    transform:translateY(-50%);
}
.goal-box.left{left:0;}
.goal-box.right{right:0;}

.goal{
    width:25px;
    height:340px;
    background:white;
    top:50%;
    transform:translateY(-50%);
}
.goal.left{left:0;}
.goal.right{right:0;}

/* PLAYERS */
.player,.cpu,.player-goalie,.cpu-goalie{
    border-radius:50%;
    border:4px solid white;
}

.player{
    width:82px;
    height:82px;
    background:#1971c2;
    box-shadow:0 0 30px #4dabf7;
}

.cpu{
    width:82px;
    height:82px;
    background:#e03131;
    box-shadow:0 0 30px #ff6b6b;
}

.player-goalie{
    width:70px;
    height:70px;
    background:#7048e8;
}

.cpu-goalie{
    width:70px;
    height:70px;
    background:#f59f00;
}

/* BALL */
.ball{
    width:48px;
    height:48px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,white,#ccc);
    border:3px solid black;
}

/* HUD */
.hud{
    position:absolute;
    width:100%;
    top:15px;
    display:flex;
    justify-content:center;
    gap:50px;
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:3px 3px 8px black;
    z-index:10;
}

/* UI */
.stamina-box,.power-box{
    position:absolute;
    left:20px;
    width:260px;
    height:24px;
    border-radius:20px;
    overflow:hidden;
    border:2px solid white;
    background:#333;
}

.stamina-box{top:20px;}
.power-box{top:60px;height:20px;}

.stamina{height:100%;background:lime;width:100%;}
.power{height:100%;background:orange;width:0%;}

.timer{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    font-size:32px;
    font-weight:bold;
}

/* WIN */
#winner{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:999;
}

/* PARTICLES */
.particle{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:white;
}

/* TRAIL */
.trail{
    position:absolute;
    width:24px;
    height:24px;
    border-radius:50%;
    opacity:0.5;
}
</style>
</head>

<body>

<div id="camera">
<div id="game">

<div class="hud">
    <div>PLAYER <span id="playerScore">0</span></div>
    <div>CPU <span id="cpuScore">0</span></div>
</div>

<div class="stamina-box"><div class="stamina" id="stamina"></div></div>
<div class="power-box"><div class="power" id="power"></div></div>

<div class="timer">⏱ <span id="time">180</span></div>

<div class="player" id="player"></div>
<div class="cpu" id="cpu"></div>

<div class="player-goalie" id="playerGoalie"></div>
<div class="cpu-goalie" id="cpuGoalie"></div>

<div class="ball" id="ball"></div>

<div id="winner">
    <h1 id="winnerText"></h1>
    <button onclick="location.reload()">PLAY AGAIN</button>
</div>

</div>
</div>

<script>

/* ELEMENTS */
const game = document.getElementById("game");
const camera = document.getElementById("camera");

const player = document.getElementById("player");
const cpu = document.getElementById("cpu");
const ball = document.getElementById("ball");

const staminaBar = document.getElementById("stamina");
const powerBar = document.getElementById("power");

const playerScoreText = document.getElementById("playerScore");
const cpuScoreText = document.getElementById("cpuScore");

/* STATE */
const keys = {};
let gameEnded = false;

let playerX=150, playerY=200;
let playerVX=0, playerVY=0;

let cpuX=800, cpuY=200;
let cpuVX=0, cpuVY=0;

let ballX=400, ballY=300;
let ballVX=0, ballVY=0;

let stamina=100;
let power=0;
let shootCooldown=0;

let playerScore=0;
let cpuScore=0;

let spacePrev=false;

/* INPUT */
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* HELPERS */
const rect = () => game.getBoundingClientRect();

function goalBounds(){
    const h = rect().height;
    return {top:h/2-170,bottom:h/2+170};
}

/* PLAYER */
function movePlayer(){

    let accel=0.55;
    let max=5;

    if(keys["shift"] && stamina>0){
        max=6.5;
        stamina-=1;
    }else stamina+=0.3;

    stamina=Math.max(0,Math.min(100,stamina));
    staminaBar.style.width=stamina+"%";

    if(keys["w"])playerVY-=accel;
    if(keys["s"])playerVY+=accel;
    if(keys["a"])playerVX-=accel;
    if(keys["d"])playerVX+=accel;

    playerVX=Math.max(-max,Math.min(max,playerVX));
    playerVY=Math.max(-max,Math.min(max,playerVY));

    playerX+=playerVX;
    playerY+=playerVY;

    playerVX*=0.88;
    playerVY*=0.88;

    player.style.left=playerX+"px";
    player.style.top=playerY+"px";

    if(keys[" "]){
        power=Math.min(100,power+2);
    }else power=Math.max(0,power-2);

    powerBar.style.width=power+"%";

    if(spacePrev && !keys[" "] && shootCooldown<=0){
        shoot();
    }

    spacePrev=keys[" "];
}

/* SHOOT */
function shoot(){
    const dx=ballX-playerX;
    const dy=ballY-playerY;
    const a=Math.atan2(dy,dx);
    const f=8+power/5;

    ballVX=Math.cos(a)*f;
    ballVY=Math.sin(a)*f;

    power=0;
}

/* CPU */
function moveCPU(){
    const targetX=ballX;
    const targetY=ballY;

    let dx=targetX-cpuX;
    let dy=targetY-cpuY;
    let d=Math.hypot(dx,dy)||1;

    cpuVX+=(dx/d)*0.6;
    cpuVY+=(dy/d)*0.6;

    cpuVX=Math.max(-5,Math.min(5,cpuVX));
    cpuVY=Math.max(-5,Math.min(5,cpuVY));

    cpuVX*=0.92;
    cpuVY*=0.92;

    cpuX+=cpuVX;
    cpuY+=cpuVY;

    cpu.style.left=cpuX+"px";
    cpu.style.top=cpuY+"px";
}

/* BALL */
function updateBall(){

    ballX+=ballVX;
    ballY+=ballVY;

    ballVX*=0.98;
    ballVY*=0.98;

    const g=goalBounds();

    /* GOALS */
    if(ballX<0 && ballY>g.top && ballY<g.bottom){
        cpuScore++;
        cpuScoreText.textContent=cpuScore;
        reset();
    }

    if(ballX>rect().width && ballY>g.top && ballY<g.bottom){
        playerScore++;
        playerScoreText.textContent=playerScore;
        reset();
    }

    ball.style.left=ballX+"px";
    ball.style.top=ballY+"px";
}

/* RESET */
function reset(){
    ballX=rect().width/2;
    ballY=rect().height/2;
    ballVX=0;
    ballVY=0;
}

/* SHAKE (FIXED) */
function shake(power){
    let i=8;
    const t=setInterval(()=>{
        camera.style.transform=
        `translate(${(Math.random()-0.5)*power}px,${(Math.random()-0.5)*power}px)`;
        if(--i<=0){
            clearInterval(t);
            camera.style.transform="translate(0,0)";
        }
    },16);
}

/* LOOP */
function loop(){
    if(!gameEnded){
        movePlayer();
        moveCPU();
        updateBall();
    }
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
