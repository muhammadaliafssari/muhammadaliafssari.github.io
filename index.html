<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gen Soccer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#0b0b0b;
}

/* GAME */

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
    repeating-linear-gradient(
        90deg,
        #1b8a3d 0px,
        #1b8a3d 120px,
        #2ca84c 120px,
        #2ca84c 240px
    );
}

/* FIELD */

.line{
    position:absolute;
    background:white;
}

.center-line{
    width:4px;
    height:100%;
    left:50%;
    transform:translateX(-50%);
}

.center-circle{
    position:absolute;
    width:240px;
    height:240px;
    border:5px solid white;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.goal-box{
    position:absolute;
    width:170px;
    height:340px;
    border:5px solid white;
    top:50%;
    transform:translateY(-50%);
}

.goal-box.left{
    left:0;
}

.goal-box.right{
    right:0;
}

.goal{
    position:absolute;
    width:25px;
    height:340px;
    background:white;
    top:50%;
    transform:translateY(-50%);
}

.goal.left{
    left:0;
}

.goal.right{
    right:0;
}

/* PLAYERS */

.player,
.cpu,
.player-goalie,
.cpu-goalie{
    position:absolute;
    border-radius:50%;
    border:4px solid white;
}

/* MAIN PLAYER */

.player{
    width:82px;
    height:82px;
    background:#1971c2;
    box-shadow:0 0 30px #4dabf7;
}

/* CPU */

.cpu{
    width:82px;
    height:82px;
    background:#e03131;
    box-shadow:0 0 30px #ff6b6b;
}

/* GOALIES */

.player-goalie{
    width:70px;
    height:70px;
    background:#7048e8;
    box-shadow:0 0 25px #b197fc;
}

.cpu-goalie{
    width:70px;
    height:70px;
    background:#f59f00;
    box-shadow:0 0 25px #ffd43b;
}

/* BALL */

.ball{
    position:absolute;
    width:48px;
    height:48px;
    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,white,#ccc);

    border:3px solid black;

    box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* HUD */

.hud{
    position:absolute;
    width:100%;
    top:15px;

    display:flex;
    justify-content:center;
    gap:50px;

    color:white;
    font-size:42px;
    font-weight:bold;

    text-shadow:3px 3px 8px black;

    z-index:10;
}

/* STAMINA */

.stamina-box{
    position:absolute;
    left:20px;
    top:20px;

    width:260px;
    height:24px;

    border-radius:20px;
    overflow:hidden;

    border:2px solid white;

    background:#333;
}

.stamina{
    width:100%;
    height:100%;
    background:lime;
}

/* POWER */

.power-box{
    position:absolute;
    left:20px;
    top:60px;

    width:260px;
    height:20px;

    border-radius:20px;
    overflow:hidden;

    border:2px solid white;

    background:#333;
}

.power{
    width:0%;
    height:100%;
    background:orange;
}

/* TIMER */

.timer{
    position:absolute;
    top:20px;
    right:20px;

    color:white;
    font-size:32px;
    font-weight:bold;
}

/* CONTROLS */

.controls{
    position:absolute;
    left:20px;
    bottom:20px;

    padding:16px;

    color:white;

    background:rgba(0,0,0,0.45);

    border-radius:14px;

    font-size:18px;
}

/* MINIMAP */

.minimap{
    position:absolute;
    right:20px;
    bottom:20px;

    width:220px;
    height:120px;

    border:2px solid white;

    background:rgba(0,0,0,0.4);

    border-radius:12px;
}

/* WIN */

#winner{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,0.92);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;

    color:white;
}

#winner h1{
    font-size:100px;
    margin-bottom:25px;

    text-shadow:0 0 30px white;
}

#winner button{
    padding:16px 42px;

    border:none;
    border-radius:14px;

    background:#2f9e44;

    color:white;

    font-size:25px;

    cursor:pointer;

    transition:0.2s;
}

#winner button:hover{
    transform:scale(1.1);
}

/* PARTICLES */

.particle{
    position:absolute;

    width:10px;
    height:10px;

    border-radius:50%;

    background:white;

    pointer-events:none;
}

</style>
</head>

<body>

<div id="game">

    <!-- FIELD -->
    <div class="line center-line"></div>

    <div class="center-circle"></div>

    <div class="goal-box left"></div>
    <div class="goal-box right"></div>

    <div class="goal left"></div>
    <div class="goal right"></div>

    <!-- HUD -->
    <div class="hud">
        <div>PLAYER <span id="playerScore">0</span></div>
        <div>CPU <span id="cpuScore">0</span></div>
    </div>

    <!-- STAMINA -->
    <div class="stamina-box">
        <div class="stamina" id="stamina"></div>
    </div>

    <!-- POWER -->
    <div class="power-box">
        <div class="power" id="power"></div>
    </div>

    <!-- TIMER -->
    <div class="timer">
        ⏱ <span id="time">180</span>
    </div>

    <!-- PLAYERS -->
    <div class="player" id="player"></div>

    <div class="cpu" id="cpu"></div>

    <!-- GOALIES -->
    <div class="player-goalie" id="playerGoalie"></div>

    <div class="cpu-goalie" id="cpuGoalie"></div>

    <!-- BALL -->
    <div class="ball" id="ball"></div>

    <!-- CONTROLS -->
    <div class="controls">
        W A S D = Move<br>
        SHIFT = Sprint<br>
        SPACE = Charge Shot
    </div>

    <!-- MINIMAP -->
    <div class="minimap"></div>

    <!-- WIN -->
    <div id="winner">
        <h1 id="winnerText"></h1>

        <button onclick="restartGame()">
            PLAY AGAIN
        </button>
    </div>

</div>

<script>

/* =========================
   ELEMENTS
========================= */

const player = document.getElementById("player");
const cpu = document.getElementById("cpu");

const playerGoalie =
document.getElementById("playerGoalie");

const cpuGoalie =
document.getElementById("cpuGoalie");

const ball = document.getElementById("ball");

const staminaBar =
document.getElementById("stamina");

const powerBar =
document.getElementById("power");

const playerScoreText =
document.getElementById("playerScore");

const cpuScoreText =
document.getElementById("cpuScore");

const timerText =
document.getElementById("time");

const winnerScreen =
document.getElementById("winner");

const winnerText =
document.getElementById("winnerText");

/* =========================
   GAME VARIABLES
========================= */

const keys = {};

let playerScore = 0;
let cpuScore = 0;

let gameEnded = false;

/* PLAYER */

let playerX = 150;
let playerY = innerHeight/2;

let playerVX = 0;
let playerVY = 0;

/* CPU */

let cpuX = innerWidth - 220;
let cpuY = innerHeight/2;

let cpuVX = 0;
let cpuVY = 0;

/* GOALIES */

let playerGoalieY =
innerHeight/2;

let cpuGoalieY =
innerHeight/2;

/* BALL */

let ballX = innerWidth/2;
let ballY = innerHeight/2;

let ballVX = 0;
let ballVY = 0;

/* PLAYER SYSTEMS */

let stamina = 100;
let power = 0;

let exhausted = false;
let exhaustTimer = 0;

/* TIMER */

let timeLeft = 180;

/* =========================
   INPUT
========================= */

document.addEventListener("keydown",e=>{

    keys[e.key.toLowerCase()] = true;

});

document.addEventListener("keyup",e=>{

    keys[e.key.toLowerCase()] = false;

});

/* =========================
   PLAYER MOVEMENT
========================= */

function movePlayer(){

    let acceleration = 0.65;
    let friction = 0.88;
    let maxSpeed = 5.2;

    /* SPRINT */

    if(keys["shift"] && stamina > 0 && !exhausted){

        maxSpeed = 7;

        stamina -= 1.4;

        friction = 0.91;

    }else{

        stamina += 0.28;
    }

    /* EXHAUSTION */

    if(stamina <= 0){

        stamina = 0;

        exhausted = true;

        exhaustTimer = 120;
    }

    if(exhausted){

        maxSpeed = 3.5;

        exhaustTimer--;

        if(exhaustTimer <= 0){

            exhausted = false;
        }
    }

    stamina =
    Math.max(0,Math.min(100,stamina));

    staminaBar.style.width =
    stamina + "%";

    /* MOVEMENT */

    if(keys["w"]) playerVY -= acceleration;
    if(keys["s"]) playerVY += acceleration;

    if(keys["a"]) playerVX -= acceleration;
    if(keys["d"]) playerVX += acceleration;

    /* LIMIT */

    playerVX =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,playerVX));

    playerVY =
    Math.max(-maxSpeed,
    Math.min(maxSpeed,playerVY));

    /* APPLY */

    playerX += playerVX;
    playerY += playerVY;

    /* FRICTION */

    playerVX *= friction;
    playerVY *= friction;

    /* WALLS */

    playerX =
    Math.max(0,
    Math.min(innerWidth-82,playerX));

    playerY =
    Math.max(0,
    Math.min(innerHeight-82,playerY));

    /* VISUAL */

    player.style.left =
    playerX + "px";

    player.style.top =
    playerY + "px";

    player.style.transform =
    `rotate(${playerVX*2.4}deg)`;

    /* POWER SHOT */

    if(keys[" "]){

        power += 1.8;

        power =
        Math.min(100,power);

    }else{

        power -= 2.4;

        power =
        Math.max(0,power);
    }

    powerBar.style.width =
    power + "%";

}

/* =========================
   CPU AI
========================= */

function moveCPU(){

    let targetX = ballX;
    let targetY = ballY;

    /* DEFENSE */

    if(ballX < innerWidth/2){

        targetX =
        innerWidth - 320;
    }

    cpuVX +=
    (targetX - cpuX) * 0.0008;

    cpuVY +=
    (targetY - cpuY) * 0.0008;

    cpuVX *= 0.94;
    cpuVY *= 0.94;

    cpuX += cpuVX;
    cpuY += cpuVY;

    cpu.style.left =
    cpuX + "px";

    cpu.style.top =
    cpuY + "px";

    cpu.style.transform =
    `rotate(${cpuVX*2.4}deg)`;

}

/* =========================
   GOALIES
========================= */

function moveGoalies(){

    playerGoalieY +=
    (ballY - playerGoalieY) * 0.05;

    cpuGoalieY +=
    (ballY - cpuGoalieY) * 0.05;

    playerGoalie.style.left =
    "65px";

    playerGoalie.style.top =
    playerGoalieY + "px";

    cpuGoalie.style.left =
    (innerWidth-105) + "px";

    cpuGoalie.style.top =
    cpuGoalieY + "px";

}

/* =========================
   BALL
========================= */

function updateBall(){

    ballX += ballVX;
    ballY += ballVY;

    /* FRICTION */

    ballVX *= 0.988;
    ballVY *= 0.988;

    /* WALLS */

    if(ballY <= 0 ||
       ballY >= innerHeight-48){

        ballVY *= -1;
    }

    /* COLLISION */

    collidePlayer(
        playerX,
        playerY,
        true
    );

    collidePlayer(
        cpuX,
        cpuY,
        false
    );

    collideGoalie(
        65,
        playerGoalieY
    );

    collideGoalie(
        innerWidth-105,
        cpuGoalieY
    );

    /* GOALS */

    if(ballX <= 0){

        cpuScore++;

        cpuScoreText.textContent =
        cpuScore;

        goalExplosion();

        resetField();
    }

    if(ballX >= innerWidth-48){

        playerScore++;

        playerScoreText.textContent =
        playerScore;

        goalExplosion();

        resetField();
    }

    /* VISUAL */

    ball.style.left =
    ballX + "px";

    ball.style.top =
    ballY + "px";

    ball.style.transform =
    `rotate(${ballX+ballY}deg)`;

}

/* =========================
   COLLISION
========================= */

function collidePlayer(x,y,isPlayer){

    const dx =
    (ballX+24) - (x+41);

    const dy =
    (ballY+24) - (y+41);

    const dist =
    Math.hypot(dx,dy);

    if(dist < 68){

        const angle =
        Math.atan2(dy,dx);

        const strength =
        isPlayer
        ? 10 + (power/5)
        : 10;

        ballVX =
        Math.cos(angle) * strength;

        ballVY =
        Math.sin(angle) * strength;

        spawnParticles(
            ballX,
            ballY
        );
    }
}

/* =========================
   GOALIE COLLISION
========================= */

function collideGoalie(x,y){

    const dx =
    (ballX+24) - (x+35);

    const dy =
    (ballY+24) - (y+35);

    const dist =
    Math.hypot(dx,dy);

    if(dist < 58){

        ballVX *= -1.2;
        ballVY *= 1.1;

        spawnParticles(
            ballX,
            ballY
        );
    }
}

/* =========================
   PARTICLES
========================= */

function spawnParticles(x,y){

    for(let i=0;i<14;i++){

        const p =
        document.createElement("div");

        p.classList.add("particle");

        p.style.left =
        x + "px";

        p.style.top =
        y + "px";

        document.body.appendChild(p);

        const angle =
        Math.random()*Math.PI*2;

        const speed =
        Math.random()*7;

        let px = x;
        let py = y;

        const interval =
        setInterval(()=>{

            px +=
            Math.cos(angle)*speed;

            py +=
            Math.sin(angle)*speed;

            p.style.left =
            px + "px";

            p.style.top =
            py + "px";

            p.style.opacity -= 0.04;

        },16);

        setTimeout(()=>{

            clearInterval(interval);

            p.remove();

        },400);
    }
}

/* =========================
   GOAL EFFECT
========================= */

function goalExplosion(){

    document.body.style.background =
    "white";

    setTimeout(()=>{

        document.body.style.background =
        "#0b0b0b";

    },120);

    spawnParticles(ballX,ballY);

}

/* =========================
   RESET
========================= */

function resetField(){

    playerX = 150;
    playerY = innerHeight/2;

    cpuX = innerWidth-220;
    cpuY = innerHeight/2;

    ballX = innerWidth/2;
    ballY = innerHeight/2;

    ballVX = 0;
    ballVY = 0;

}

/* =========================
   TIMER
========================= */

setInterval(()=>{

    if(gameEnded) return;

    if(timeLeft > 0){

        timeLeft--;

        timerText.textContent =
        timeLeft;

    }else{

        endGame();
    }

},1000);

/* =========================
   END GAME
========================= */

function endGame(){

    gameEnded = true;

    winnerScreen.style.display =
    "flex";

    if(playerScore > cpuScore){

        winnerText.textContent =
        "YOU WIN!";

    }else if(cpuScore > playerScore){

        winnerText.textContent =
        "CPU WINS!";

    }else{

        winnerText.textContent =
        "DRAW!";
    }
}

/* =========================
   RESTART
========================= */

function restartGame(){

    location.reload();

}

/* =========================
   LOOP
========================= */

function gameLoop(){

    if(!gameEnded){

        movePlayer();

        moveCPU();

        moveGoalies();

        updateBall();
    }

    requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
