<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#1e7d32;
        font-family:Arial, sans-serif;
    }

    /* Soccer Field */
    #field{
        width:100vw;
        height:100vh;
        position:relative;
        background:
            linear-gradient(
                to right,
                #1e7d32 0%,
                #228b38 50%,
                #1e7d32 100%
            );
    }

    /* Field lines */
    .mid-line{
        position:absolute;
        left:50%;
        top:0;
        width:4px;
        height:100%;
        background:white;
        transform:translateX(-50%);
    }

    .center-circle{
        position:absolute;
        width:180px;
        height:180px;
        border:5px solid white;
        border-radius:50%;
        left:50%;
        top:50%;
        transform:translate(-50%, -50%);
    }

    /* Player */
    #player{
        width:70px;
        height:70px;
        background:#1976d2;
        border-radius:50%;
        position:absolute;
        left:200px;
        top:200px;
        border:4px solid white;
        transition:transform 0.05s linear;
    }

    /* Soccer Ball */
    #ball{
        width:45px;
        height:45px;
        background:white;
        border-radius:50%;
        position:absolute;
        left:500px;
        top:300px;
        border:3px solid black;
        overflow:hidden;
    }

    /* Ball pattern */
    #ball::before{
        content:"";
        position:absolute;
        inset:8px;
        background:
            radial-gradient(circle, black 20%, transparent 21%);
        background-size:14px 14px;
    }

    /* Instructions */
    .info{
        position:absolute;
        top:15px;
        left:15px;
        color:white;
        font-size:20px;
        background:rgba(0,0,0,0.4);
        padding:10px 15px;
        border-radius:12px;
    }
</style>
</head>
<body>

<div id="field">
    <div class="mid-line"></div>
    <div class="center-circle"></div>

    <div class="info">
        WASD = Move Player<br>
        Move Mouse = Soccer Ball Follows
    </div>

    <div id="player"></div>
    <div id="ball"></div>
</div>

<script>
    const player = document.getElementById("player");
    const ball = document.getElementById("ball");

    // PLAYER POSITION
    let playerX = 200;
    let playerY = 200;
    const speed = 6;

    // KEY CONTROLS
    const keys = {};

    document.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;
    });

    document.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
    });

    // MOVE PLAYER
    function movePlayer(){

        if(keys["w"]) playerY -= speed;
        if(keys["s"]) playerY += speed;
        if(keys["a"]) playerX -= speed;
        if(keys["d"]) playerX += speed;

        // Keep inside screen
        playerX = Math.max(0, Math.min(window.innerWidth - 70, playerX));
        playerY = Math.max(0, Math.min(window.innerHeight - 70, playerY));

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";

        requestAnimationFrame(movePlayer);
    }

    movePlayer();

    // BALL FOLLOWS MOUSE
    let mouseX = 500;
    let mouseY = 300;

    document.addEventListener("mousemove", (e)=>{
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    let ballX = 500;
    let ballY = 300;

    function moveBall(){
        // Smooth follow effect
        ballX += (mouseX - ballX) * 0.08;
        ballY += (mouseY - ballY) * 0.08;

        ball.style.left = ballX + "px";
        ball.style.top = ballY + "px";

        requestAnimationFrame(moveBall);
    }

    moveBall();
</script>

</body>
</html>
